# Default values for nvd-checker.

replicaCount: 2

image:
  repository: nvd-checker-mcp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: nvd-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: nvd-mcp-tls
  #    hosts:
  #      - nvd-mcp.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /mcp
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /mcp
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ConfigMap values
config:
  logLevel: "INFO"
  workers: "2"
  cloneTimeout: "120"

# External Secret values
externalSecret:
  enabled: true
  refreshInterval: "1h"
  store:
    name: "my-secret-store" # Example: aws-parameterstore, vault-backend
    kind: "ClusterSecretStore" # or "SecretStore"
  remoteRef:
    key: "nvd-checker-secrets"
    property: "NVD_API_KEY"
